training:
  num_epochs: 1
  eval_freq: 50
  eval_iter: 1
  lr: 0.0006
  weight_decay: 0.1
  batch_size: 8
  max_length: 256
  stride: 128
  warmup_ratio: 0.1
  warmup_min_lr: 6e-05
  decay_floor_lr: 1e-06
  max_norm: 1.0

data:
  file_path: "/Users/nikmag/Documents/learning-llms-from-first-principles/src/learning_llms_from_first_principles/data/wikipedia_10mb.txt"
  train_ratio: 0.999
  val_ratio: 0.001

model:
  name: "gpt2-124m"
  save_model_path: "~/gpt_model.pth"  # Set to null to skip saving
